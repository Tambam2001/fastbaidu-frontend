name = "fastbaidu-frontend"
type = "javascript"
compatibility_date = "2024-01-01"

# Cloudflare Pages configuration
# DO NOT use 'npx wrangler deploy' - Pages handles deployment automatically
# Leave deploy command EMPTY in Cloudflare Pages settings

[build]
command = "npm run build"
cwd = "./"

# For Pages Functions (SSR via adapter-cloudflare)
[build.upload]
format = "modules"
